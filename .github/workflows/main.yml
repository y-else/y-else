name: 纯Gradle安卓打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 解压项目压缩包
        run: unzip ing.zip
      
      - name: 安装Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: 安装项目依赖
        run: |
          cd ing
          npm install --force
      
      - name: 生成原生Android项目
        run: |
          cd ing
          npx expo prebuild --platform android --clean
      
      - name: 设置JDK环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 运行Gradle打包APK
        run: |
          cd ing/android
          ./gradlew assembleRelease
      
      - name: 上传生成的APK
        uses: actions/upload-artifact@v4
        with:
          name: ing-陪伴-安卓安装包
          path: ing/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
